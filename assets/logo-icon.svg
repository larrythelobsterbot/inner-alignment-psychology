<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Simplified tree-of-life icon: geometric tree with roots inside a thin circle -->
  <!-- Designed to read clearly at 40px+ -->
  
  <!-- Outer circle ring -->
  <circle cx="28" cy="28" r="26" stroke="#6B7F4E" stroke-width="1.4" fill="none"/>
  
  <!-- Trunk (central vertical) -->
  <path d="M28 15 L28 41" stroke="#8B6B4A" stroke-width="1.8" stroke-linecap="round"/>
  
  <!-- Upper branches -->
  <path d="M28 20 Q24 16 18 12" stroke="#6B7F4E" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M28 20 Q32 16 38 12" stroke="#6B7F4E" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M28 17 Q25 13 21 9" stroke="#6B7F4E" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M28 17 Q31 13 35 9" stroke="#6B7F4E" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M28 15 L28 8" stroke="#6B7F4E" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Leaf canopy (overlapping soft circles) -->
  <circle cx="17" cy="11" r="3.5" fill="#6B7F4E" opacity="0.2"/>
  <circle cx="39" cy="11" r="3.5" fill="#6B7F4E" opacity="0.2"/>
  <circle cx="20" cy="8" r="3" fill="#6B7F4E" opacity="0.2"/>
  <circle cx="36" cy="8" r="3" fill="#6B7F4E" opacity="0.2"/>
  <circle cx="28" cy="6" r="3.5" fill="#6B7F4E" opacity="0.2"/>
  
  <!-- Leaf dots at branch tips -->
  <circle cx="17.5" cy="11.5" r="1.8" fill="#6B7F4E"/>
  <circle cx="38.5" cy="11.5" r="1.8" fill="#6B7F4E"/>
  <circle cx="20.5" cy="8.5" r="1.5" fill="#6B7F4E"/>
  <circle cx="35.5" cy="8.5" r="1.5" fill="#6B7F4E"/>
  <circle cx="28" cy="6.5" r="1.6" fill="#6B7F4E"/>
  
  <!-- Lower roots (organic curves mirroring the branches) -->
  <path d="M28 36 Q24 40 18 44" stroke="#8B6B4A" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M28 36 Q32 40 38 44" stroke="#8B6B4A" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M28 39 Q25 43 22 47" stroke="#8B6B4A" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <path d="M28 39 Q31 43 34 47" stroke="#8B6B4A" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <path d="M28 41 L28 48" stroke="#8B6B4A" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Root tips (small dots) -->
  <circle cx="17.5" cy="44.5" r="1.2" fill="#8B6B4A" opacity="0.6"/>
  <circle cx="38.5" cy="44.5" r="1.2" fill="#8B6B4A" opacity="0.6"/>
  <circle cx="21.5" cy="47.5" r="1" fill="#8B6B4A" opacity="0.5"/>
  <circle cx="34.5" cy="47.5" r="1" fill="#8B6B4A" opacity="0.5"/>
</svg>